services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xrplens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xrplens
      POSTGRES_PASSWORD: xrplens_dev
      POSTGRES_DB: xrplens
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./docker/seed-data.sql:/docker-entrypoint-initdb.d/03-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xrplens"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xrplens-internal

  redis:
    image: redis:7-alpine
    container_name: xrplens-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xrplens-internal

  server:
    build:
      context: .
      target: server
    container_name: xrplens-server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://xrplens:xrplens_dev@xrplens-postgres:5432/xrplens
      REDIS_URL: redis://xrplens-redis:6379
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xrplens-internal
      - proxy

  web:
    build:
      context: .
      target: web
    container_name: xrplens-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    networks:
      - xrplens-internal
      - proxy

volumes:
  pgdata:

networks:
  xrplens-internal:
    driver: bridge
  proxy:
    external: true
